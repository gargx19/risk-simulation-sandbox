<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Risk Sandbox</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .dashboard {
            background: var(--card-bg);
            width: 100%;
            max-width: 1000px;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-top: 0;
            font-weight: 800;
            font-size: 2.2rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(15, 23, 42, 0.5);
            padding: 25px;
            border-radius: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input[type="number"] {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        input[type="range"] {
            accent-color: var(--primary);
            cursor: pointer;
            margin-top: 10px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
        }

        #ai-explainer {
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid var(--primary);
            padding: 20px 25px;
            border-radius: 0 12px 12px 0;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: #e2e8f0;
            white-space: pre-line;
        }

        .chart-container {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 16px;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.1);
        }
    </style>
  </head>

  <body>
    <div class="dashboard">
      <h1>Risk Simulation Sandbox</h1>

      <div class="controls">
        <div class="control-group">
          <label>Initial Investment ($)</label>
          <input type="number" id="investment" value="10000" />
        </div>
        <div class="control-group">
          <label>Time Horizon (Years)</label>
          <input type="number" id="years" value="10" />
        </div>
        <div class="control-group">
          <label>Stock Allocation (<span id="stock-val">80%</span>)</label>
          <input
            type="range"
            id="stocks"
            min="0"
            max="100"
            value="80"
            oninput="
              document.getElementById('stock-val').innerText = this.value + '%'
            "
          />
        </div>
        <button onclick="runSimulation()" id="sim-btn">Simulate Risk</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-title">Loss Probability</div>
          <div
            class="stat-value"
            id="probability-meter"
            style="color: var(--text-muted)"
          >
            --%
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-title">Expected Value</div>
          <div class="stat-value" id="expected-meter" style="color: #2dd4bf">
            $--
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-title">Worst Case (Bottom 5%)</div>
          <div class="stat-value" id="worst-meter" style="color: #ec4899">
            $--
          </div>
        </div>
      </div>

      <div id="ai-explainer">
        Adjust the sliders above and click simulate to see your AI-powered risk
        analysis.
      </div>

      <div class="chart-container">
        <canvas id="riskChart" width="800" height="350"></canvas>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
